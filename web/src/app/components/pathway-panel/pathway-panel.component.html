<div class="pathway-panel" *ngIf="pathway.length">
  <h3>Pathway (prerequisites → selected)</h3>
  <div class="chain">
    <ng-container *ngFor="let m of pathway; let last = last">
      <span class="node part-{{ m.part }}" [class.selected]="m.id === selectedModuleId" [title]="m.title">
        {{ m.code }}
      </span>
      <span class="arrow" *ngIf="!last">→</span>
    </ng-container>
  </div>
  <p class="hint">
    Part A (green) → Part B (amber) → Part C (pink)
  </p>
</div>
<div class="pathway-panel empty" *ngIf="!pathway.length && selectedModuleId">
  <p>Loading pathway…</p>
</div>
